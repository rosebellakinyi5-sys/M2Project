<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary | Simplified Dictionary </title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="index.js" defer></script>
</head>

<body>

    <!--Header Section -->

    <header class="app-header header-card">

        <div class="container" id="header-section">
            <h1>Wordly Dictionary</h1>
            <p class="tagline">Wordly is a simple-page dictionary application created to simplify searching for any word and get its meaning, synonyms, antonyms, and more!</p>
        </div>

    </header>

    <main>


    <!--Search Section; This section holds the input and button, basically what the user interacts with-->

      <section class="search-section">

        <div class="container" id="search-bar">

            <form id="search-form">
                <!--Created a form to collect the users input-->

                <label for="wordInput" class="search-label">Search for a word</label>
                 <!--Like the aria-label but now visible-->
                <input type="text" id="wordInput" name="word" placeholder="Enter word here..." autocomplete="off">
                <!--Included the autocomplete to prevent browser from showing previous words searched in a dropdown-->
                <button type="submit" id="searchButton">Search</button>
            
            </form>
        </div>
      </section>


    <!--Message Section; Loading & Error-->    

      <section class="message-section">

            <p id ="error-message" class="hidden" role="alert">Sorry, word not found. Please try again</p>
            <p id="loading-message" class="hidden" role="status">Loading...</p>
        
      </section>


    <!--Results section; Where the results will be displayed-->

      <section class="results-section">
    
         <div id="results" class="results hidden">

            <h2 id="word-title"></h2>

            <p id="word-phonetic"></p>

            <audio id="word-audio"></audio>

            <button id="audio-playback-btn" type="button">Play Audio</button>
            <!--Link the button to the audio in JS-->


          <!--Each word will have these 4 items; definitions ,one source, one synonym list(not all), and one favourite button-->
          <!--Each meaning of a word will have: part of speech, definition and examples-->
            <div id="word-definitions"></div>

            
          <!--Placed a 'hidden' class so that incase a word has synonyms/a source, JS will unhide them-->

          <!--Incase a word has synonyms,they'll come here-->
          <!--Remember to join them into one string in JS,and place here-->
            <p id="word-synonyms" class="hidden"></p>
          
          <!--Contain source URLS from API feedback-->
            <p id="word-src" class="hidden"></p>

            <button id="fav-btn" type="button">Add to Favorites</button>

         </div>

      </section>


    <!--Favorite Section-->

      <section class="favorite-section">

          <h2> My Favorites</h2>

        <!--Appears only when empty-->
        <p id="no-favorite-msg">No favorite word yet.</p>

        <!--Created fav items as a list-->
        <!--Each fav-item needs; the word,a way to search it again,remove button(in JS)-->
        <ul id="favoriteList" class="favorites"></ul>
     
      </section>

    </main>

</body>
</html>
